name = "cv-builder-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Public (non-secret) config. Edit these or override in the dashboard.
[vars]
CV_PROVIDER = "groq"
GROQ_MODEL = "llama-3.3-70b-versatile"
# Set after you create a Turnstile widget (public site key):
TURNSTILE_SITEKEY = ""

# Per-IP rate limiter (protects your Groq quota). 10 generations / minute / IP.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# ---- Secrets (DO NOT put here). Set them with wrangler:
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put TURNSTILE_SECRET     (optional, enables human verification)
#   wrangler secret put ANTHROPIC_API_KEY    (optional, Claude fallback)
